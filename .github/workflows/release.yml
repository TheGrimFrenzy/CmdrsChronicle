name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build Installer
        run: dotnet build Installer/Installer.csproj --configuration Release
      - name: Publish Installer
        run: dotnet publish Installer/Installer.csproj --configuration Release

      - name: Find versioned zip
        id: find_zip
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path Installer/bin/Release/* -Filter "CmdrsChronicle-*.zip" | Select-Object -First 1
          echo "ZIP_PATH=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}