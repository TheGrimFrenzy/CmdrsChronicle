<!--
  CmdrsChronicle Full Report Template (Galnet Style)
  Rendered when qualifying events exist for the date range.
  {CSS}            - replaced with inlined galnet.css content
  {TAGLINE}        - masthead tagline
  {CMDR_NAME}      - commander name
  {DATE_FROM}      - report start date (lore year)
  {DATE_TO}        - report end date (lore year)
  {TILES}          - rendered panel article blocks
  {DATE_GENERATED} - UTC generation timestamp
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CMDR&#8217;s Chronicle</title>
  <style>
{CSS}
  </style>
</head>
<body>
  <div class="page">

    <!-- Masthead -->
    <div class="mast">
      <div class="mast-rule-top"></div>
      <div class="mast-badge">&#9670; Pilots Federation &mdash; Personal Dossier &#9670;</div>
      <div class="mast-chronicle">CMDR&#8217;s Chronicle</div>
      <div class="mast-cmdr">CMDR {CMDR_NAME}</div>
      <div class="mast-tagline">&#8220;{TAGLINE}&#8221;</div>
      <div class="mast-dates">
        <strong>{DATE_FROM}</strong>
        &nbsp;&nbsp;/&nbsp;&nbsp;
        <strong>{DATE_TO}</strong>
      </div>
      <div class="mast-rule-bottom"></div>
    </div>

    <!-- Panel grid (tiles injected here) -->
    <section class="panel-grid">
{TILES}
    </section>

    <div class="galnet-page-footer">
      Generated by CMDR&#8217;s Chronicle &mdash; {DATE_GENERATED}
    </div>

  </div>
</body>
</html>
