<!--
  CmdrsChronicle Report Template - Colorful Variant
  Vibrant, multi-color infographic tile layout with large metric badges.
  CSS2 only: floats + display:table (no flexbox/grid  OpenHTMLtoPDF constraint).
  Each section's htmlFragment is the inner tile content produced by a renderer.
  The tile outer structure (icon, badge strip, gradient card) is built here.
-->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>CmdrsChronicle Report</title>
    <style>
    /* CmdrsChronicle Report CSS Colorful Variant (CSS2 compatible, floats, display:table; no flex/grid) */

    body {
        background: #f5f5f5;
        font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
        color: #222;
        margin: 0;
        padding: 0;
    }

    /* Masthead (colorful variant) */
    .masthead {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        color: #fff;
        text-align: center;
    }
    .mh-thick-rule {
        height: 8px;
        background: linear-gradient(90deg, #f093fb 0%, #f5576c 50%, #667eea 100%);
        margin: 0;
    }
    .mh-thin-rule {
        height: 2px;
        background: rgba(255,255,255,0.4);
        margin: 4px 0 0 0;
    }
    .mh-title-area {
        padding: 28px 40px 22px;
    }
    .mh-name {
        font-family: 'Segoe UI', sans-serif;
        font-size: 3.8em;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #fff;
        margin: 0 0 10px 0;
        line-height: 1;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .mh-tagline {
        font-family: 'Segoe UI', sans-serif;
        font-weight: 300;
        font-size: 1.1em;
        color: rgba(255,255,255,0.95);
        letter-spacing: 0.06em;
        margin: 0;
    }
    .mh-date-strip {
        background: rgba(0,0,0,0.15);
        font-family: 'Segoe UI', sans-serif;
        font-size: 0.82em;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.85);
        padding: 8px 40px;
        font-weight: 500;
    }

    /* Timeline wrapper */
    .timeline-wrap {
        width: 1072px;
        margin: 48px auto 80px;
    }

    /* Each row: one tile alternating left/right */
    .tl-row {
        position: relative;
        overflow: visible;
        margin-bottom: -85px;
        padding: 16px 0;
    }
    /* Clearfix: float-wrapping without overflow:hidden so shadow is not clipped */
    .tl-row:after {
        content: '';
        display: table;
        clear: both;
    }
    .tl-row:last-child {
        margin-bottom: 80px;
    }

    /* LEFT TILE: [icon 60px][tile 420px] + 20px center offset = 500px */
    .left-tile-wrapper {
        float: left;
        box-sizing: border-box;
        width: 536px;
        padding-right: 20px;
    }
    .left-tile-wrapper:after {
        content: '';
        display: table;
        clear: both;
    }

    .left-icon {
        float: left;
        width: 60px;
        height: 200px;
        text-align: center;
        line-height: 200px;
        font-size: 2.4em;
    }

    .left-tile {
        float: left;
        display: table;
        table-layout: fixed;
        width: 456px;
        height: 200px;
        border-radius: 24px 0 0 24px;
        box-shadow: 0 0 28px 6px rgba(0,0,0,0.30);
        overflow: hidden;
    }

    .left-badge-section {
        display: table-cell;
        width: 72px;
        vertical-align: middle;
        text-align: center;
        background: rgba(0,0,0,0.18);
        border-right: 1px solid rgba(255,255,255,0.15);
    }

    .left-badge {
        display: inline-block;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        font-size: 2em;
        font-weight: 900;
        color: #fff;
        letter-spacing: 0.06em;
        text-shadow: 0 2px 8px rgba(0,0,0,0.55);
        line-height: 1;
    }

    .left-badge-unit {
        display: block;
        font-size: 0.7em;
        color: #fff;
        font-weight: 600;
        margin-top: 4px;
    }

    .left-content {
        display: table-cell;
        vertical-align: top;
        padding: 0 28px 0 16px;
        text-align: right;
    }

    /* RIGHT TILE: [tile 420px][icon 60px] + 20px center offset = 500px */
    .right-tile-wrapper {
        float: right;
        box-sizing: border-box;
        width: 536px;
        padding-left: 20px;
    }
    .right-tile-wrapper:after {
        content: '';
        display: table;
        clear: both;
    }

    .right-tile {
        float: left;
        display: table;
        table-layout: fixed;
        width: 456px;
        height: 200px;
        border-radius: 0 24px 24px 0;
        box-shadow: 0 0 28px 6px rgba(0,0,0,0.30);
        overflow: hidden;
    }

    .right-content {
        display: table-cell;
        vertical-align: top;
        padding: 0 16px 0 28px;
        text-align: left;
    }

    .tile-flex {
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    .tile-body-center {
        flex: 1;
        display: flex;
        align-items: center;
    }

    .right-badge-section {
        display: table-cell;
        width: 72px;
        vertical-align: middle;
        text-align: center;
        background: rgba(0,0,0,0.18);
        border-left: 1px solid rgba(255,255,255,0.15);
    }

    .right-badge {
        display: inline-block;
        writing-mode: vertical-rl;
        font-size: 2em;
        font-weight: 900;
        color: #fff;
        letter-spacing: 0.06em;
        text-shadow: 0 2px 8px rgba(0,0,0,0.55);
        line-height: 1;
    }

    .right-badge-unit {
        display: block;
        font-size: 0.7em;
        color: #fff;
        font-weight: 600;
        margin-top: 4px;
    }

    .right-icon {
        float: left;
        width: 60px;
        height: 200px;
        text-align: center;
        line-height: 200px;
        font-size: 2.4em;
    }

    /* Tile inner content */
    .tile-inner {
        display: table;
        table-layout: fixed;
        width: 100%;
        height: 200px;
    }
    .tile-title-bar {
        display: table-row;
        height: 45px;
    }
    .tile-body-bar {
        display: table-row;
        height: auto;
    }
    .tile-body-cell {
        display: table-cell;
        vertical-align: middle;
        padding-bottom: 14px;
    }

    .infographic-title {
        font-size: 1.2em;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0;
        padding-top: 14px;
        line-height: 1.1;
        color: #111;
        text-align: center;
    }
    .tile-stat {
        font-size: 2em;
        font-weight: bold;
        letter-spacing: 1px;
        line-height: 1;
        margin: 0 0 6px 0;
        color: #111;
    }
    .infographic-detail {
        font-size: 0.9em;
        color: rgba(0,0,0,0.75);
        line-height: 1.5;
        margin: 0;
    }

    /* Table inside tile */
    .tile-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82em;
        margin-top: 6px;
    }
    .tile-table th {
        font-weight: 600;
        text-align: left;
        padding: 3px 8px 3px 0;
        border-bottom: 1px solid rgba(255,255,255,0.25);
        color: rgba(255,255,255,0.75);
    }
    .tile-table td {
        padding: 3px 0;
        border-bottom: 1px solid rgba(255,255,255,0.15);
        color: rgba(255,255,255,0.9);
    }

    /* Inara external links */
    .inara-link {
        display: inline-block;
        vertical-align: middle;
        margin-right: 4px;
        opacity: 0.85;
        text-decoration: none;
        line-height: 1;
    }
    .inara-link:hover {
        opacity: 1.0;
    }
    .inara-icon {
        width: 13px;
        height: 13px;
        vertical-align: middle;
        display: inline-block;
        background-image: url("data:image/x-icon;base64,AAABAAMAMDAAAAEAIACoJQAANgAAACAgAAABACAAqBAAAN4lAAAQEAAAAQAgAGgEAACGNgAAKAAAADAAAABgAAAAAQAgAAAAAAAAJAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAFyAmAhcgJgIAAAAAERERIxEREYURERHOERER9REREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/EBAQ/REREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/EBAQ/REREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xEREf8RERH/ERER/xERVcA==");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
    }

    /* Bar chart inside tile */
    .bar-chart-container {
        width: 100%;
        margin-top: 6px;
    }
    .bar-row {
        width: 100%;
        margin-bottom: 6px;
        overflow: hidden;
        height: 24px;
    }
    .bar-label {
        float: left;
        width: 35%;
        font-size: 0.82em;
        color: rgba(255,255,255,0.8);
        line-height: 24px;
        white-space: nowrap;
        overflow: hidden;
    }
    .bar-value {
        float: right;
        width: 14%;
        font-size: 0.82em;
        font-weight: bold;
        color: #fff;
        text-align: right;
        line-height: 24px;
    }
    .bar {
        float: left;
        height: 14px;
        max-width: 47%;
        background: rgba(255,255,255,0.25);
        border-radius: 3px;
        margin-top: 5px;
        margin-left: 2%;
    }

    /* Category gradients  Vibrant Colors */
    .grad-travel      { background: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%); }
    .grad-combat      { background: linear-gradient(135deg, #ff512f 0%, #dd2476 100%); }
    .grad-exploration { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .grad-exobiology  { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .grad-trade       { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); }
    .grad-powerplay   { background: linear-gradient(135deg, #fc5c7d 0%, #6a82fb 100%); }
    .grad-fleetcarriers { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
    .grad-colonisation { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); }
    .grad-onfoot      { background: linear-gradient(135deg, #e96443 0%, #904e95 100%); }
    .grad-mining       { background: linear-gradient(135deg, #373b44 0%, #4286f4 100%); }
    .grad-engineering  { background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%); }
    .grad-crew         { background: linear-gradient(135deg, #7f00ff 0%, #e100ff 100%); }

    /* Print/PDF page breaks */
    @media print {
        .tl-row { page-break-inside: avoid; }
    }

    /* Empty-state GalNet article (no qualifying sections) */
    .galnet-wrap {
        width: 700px;
        margin: 60px auto 80px;
    }
    .galnet-article {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: 3px solid #f093fb;
    }
    </style>
</head>
