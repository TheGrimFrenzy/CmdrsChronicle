<!--
  CmdrsChronicle Full Report Template (Elegant Style)
  Rendered when qualifying events exist for the date range.
  [CSS]            - replaced with inlined elegant.css content
  [TAGLINE]        - masthead tagline
  [CMDR_NAME]      - commander name
  [DATE_FROM]      - report start date (lore year)
  [DATE_TO]        - report end date (lore year)
  [TILES]          - rendered infographic tile HTML blocks
  [DATE_GENERATED] - UTC generation timestamp
-->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>CMDR&#8217;s Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
    <style>
{CSS}
    </style>
</head>
<body>

    <!-- Masthead -->
    <div class="masthead">
        <div class="mh-thick-rule"></div>
        <div class="mh-title-area">
            <h1 class="mh-name">CMDR&#8217;S CHRONICLE</h1>
            <p class="mh-tagline">{TAGLINE}</p>
        </div>
        <div class="mh-thin-rule"></div>
        <div class="mh-date-strip">
            CMDR&#8217;s Log
            &#160;&#9830;&#160;
            <span>{DATE_FROM}</span>
            &#160;&#8212;&#160;
            <span>{DATE_TO}</span>
            &#160;&#9830;&#160;
            <span>CMDR {CMDR_NAME} Edition</span>
        </div>
        <div class="mh-thick-rule"></div>
    </div>

    <!-- Infographic Tiles -->
    <div class="tiles-container">
        <div class="tile-grid">
{TILES}
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p class="footer-text">Generated by CMDR&#8217;s Chronicle &#8212; {DATE_GENERATED}</p>
    </div>

</body>
</html>
